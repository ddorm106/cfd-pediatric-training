/* ─── WEB AUDIO SYNTHESIS ───────────────────────────────────────── */
function getACtx() {
  try { return new (window.AudioContext || window.webkitAudioContext)(); }
  catch (e) { return null; }
}

function playHeartSound(bpm = 75) {
  const ctx = getACtx(); if (!ctx) return;
  const duration = 6;
  const interval = 60 / bpm;
  const beats = Math.floor(duration / interval);
  for (let i = 0; i < beats; i++) {
    const t = ctx.currentTime + 0.1 + i * interval;
    // S1 Lub
    const o1 = ctx.createOscillator(); const g1 = ctx.createGain();
    o1.type = "sine"; o1.frequency.value = 50;
    g1.gain.setValueAtTime(0, t); g1.gain.linearRampToValueAtTime(0.7, t + 0.02);
    g1.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    o1.connect(g1); g1.connect(ctx.destination); o1.start(t); o1.stop(t + 0.14);
    // S2 Dub (slightly higher pitch, shorter)
    const t2 = t + 0.18;
    const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
    o2.type = "sine"; o2.frequency.value = 68;
    g2.gain.setValueAtTime(0, t2); g2.gain.linearRampToValueAtTime(0.5, t2 + 0.018);
    g2.gain.exponentialRampToValueAtTime(0.001, t2 + 0.11);
    o2.connect(g2); g2.connect(ctx.destination); o2.start(t2); o2.stop(t2 + 0.11);
  }
  setTimeout(() => { try { ctx.close(); } catch (e) {} }, (duration + 2) * 1000);
}

function playLungSound(type) {
  const ctx = getACtx(); if (!ctx) return;
  const sr = ctx.sampleRate;

  function noiseBuffer(dur, amp = 1) {
    const buf = ctx.createBuffer(1, Math.floor(sr * dur), sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * amp;
    return buf;
  }

  function breath(t, inhaleDur, exhaleDur, amp = 0.3, freq = 280) {
    const buf = noiseBuffer(inhaleDur + exhaleDur, 1);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type = "bandpass"; filt.frequency.value = freq; filt.Q.value = 0.6;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(amp, t + inhaleDur * 0.4);
    gain.gain.setValueAtTime(amp, t + inhaleDur);
    gain.gain.linearRampToValueAtTime(0, t + inhaleDur + exhaleDur);
    src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    src.start(t); src.stop(t + inhaleDur + exhaleDur);
  }

  if (type === "normal") {
    for (let i = 0; i < 4; i++) breath(ctx.currentTime + i * 1.5, 0.7, 0.8, 0.25, 280);
  } else if (type === "wheeze") {
    for (let i = 0; i < 3; i++) {
      const t = ctx.currentTime + i * 2.2;
      breath(t, 0.6, 0.3, 0.18, 250);
      // Expiratory wheeze oscillator
      const osc = ctx.createOscillator(); osc.type = "sawtooth";
      osc.frequency.setValueAtTime(550, t + 0.7);
      osc.frequency.linearRampToValueAtTime(750, t + 1.6);
      const wf = ctx.createBiquadFilter(); wf.type = "bandpass"; wf.frequency.value = 650; wf.Q.value = 3;
      const wg = ctx.createGain();
      wg.gain.setValueAtTime(0, t + 0.7); wg.gain.linearRampToValueAtTime(0.1, t + 0.8);
      wg.gain.setValueAtTime(0.1, t + 1.5); wg.gain.linearRampToValueAtTime(0, t + 1.7);
      osc.connect(wf); wf.connect(wg); wg.connect(ctx.destination);
      osc.start(t + 0.7); osc.stop(t + 1.7);
    }
  } else if (type === "crackles") {
    for (let i = 0; i < 3; i++) {
      const t = ctx.currentTime + i * 2;
      breath(t, 0.8, 0.7, 0.15, 300);
      const count = 10 + Math.floor(Math.random() * 8);
      for (let c = 0; c < count; c++) {
        const ct = t + 0.05 + Math.random() * 0.7;
        const cbuf = ctx.createBuffer(1, 600, sr);
        const cd = cbuf.getChannelData(0);
        for (let j = 0; j < 600; j++) cd[j] = (Math.random() * 2 - 1) * Math.exp(-j / 70);
        const csrc = ctx.createBufferSource(); csrc.buffer = cbuf;
        const cg = ctx.createGain(); cg.gain.value = 0.55;
        csrc.connect(cg); cg.connect(ctx.destination); csrc.start(ct);
      }
    }
  } else if (type === "stridor") {
    for (let i = 0; i < 3; i++) {
      const t = ctx.currentTime + i * 2.3;
      // Harsh inspiratory stridor
      const osc = ctx.createOscillator(); osc.type = "sawtooth"; osc.frequency.value = 320;
      const sf = ctx.createBiquadFilter(); sf.type = "bandpass"; sf.frequency.value = 900; sf.Q.value = 2.5;
      const sg = ctx.createGain();
      sg.gain.setValueAtTime(0, t); sg.gain.linearRampToValueAtTime(0.11, t + 0.1);
      sg.gain.setValueAtTime(0.11, t + 0.8); sg.gain.linearRampToValueAtTime(0, t + 1.0);
      osc.connect(sf); sf.connect(sg); sg.connect(ctx.destination); osc.start(t); osc.stop(t + 1.0);
      // Quiet exhalation
      breath(t + 1.1, 0.3, 0.8, 0.07, 200);
    }
  } else if (type === "diminished") {
    for (let i = 0; i < 4; i++) breath(ctx.currentTime + i * 1.5, 0.7, 0.8, 0.07, 240);
  }

  setTimeout(() => { try { ctx.close(); } catch (e) {} }, 10000);
}

/* ─── SHARED COMPONENTS ─────────────────────────────────────────── */
function Bar({ current, total, color }) {
  return (
    <div style={{ width: "100%", background: T.border, borderRadius: 8, height: 8, overflow: "hidden" }}>
      <div style={{ width: `${Math.round((current / total) * 100)}%`, background: color || T.red, height: "100%", borderRadius: 8, transition: "width 0.5s" }} />
    </div>
  );
}

function Quiz({ question, onAnswer, answered, selectedIdx }) {
  return (
    <div style={{ background: T.bg, borderRadius: 12, padding: 24, marginBottom: 16, border: `1px solid ${T.border}`, boxShadow: shadow }}>
      <p style={{ fontWeight: 700, fontSize: 17, color: T.black, marginBottom: 16, lineHeight: 1.5 }}>{question.q}</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {question.options.map((opt, i) => {
          let bg = T.bgAlt, bd = T.border, c = T.text;
          if (answered) {
            if (i === question.correct) { bg = T.okBg; bd = T.ok; c = T.ok; }
            else if (i === selectedIdx) { bg = T.errBg; bd = T.err; c = "#991B1B"; }
          }
          return (
            <button key={i} onClick={() => !answered && onAnswer(i)} disabled={answered}
              style={{ background: bg, border: `2px solid ${bd}`, borderRadius: 10, padding: "12px 16px", textAlign: "left", color: c, fontSize: 15, cursor: answered ? "default" : "pointer", fontFamily: "inherit", lineHeight: 1.4 }}>
              <span style={{ fontWeight: 600, marginRight: 8, opacity: 0.5 }}>{String.fromCharCode(65 + i)}.</span>{opt}
            </button>
          );
        })}
      </div>
      {answered && question.explanation && (
        <div style={{ marginTop: 16, padding: 16, background: T.goldBg, borderRadius: 10, borderLeft: `4px solid ${T.gold}` }}>
          <p style={{ color: T.goldText, fontSize: 14, lineHeight: 1.6, margin: 0 }}><strong>💡</strong> {question.explanation}</p>
        </div>
      )}
    </div>
  );
}

function InfoCard({ icon, title, children, color = T.border, bg = T.bg }) {
  return (
    <div style={{ background: bg, borderRadius: 14, padding: 20, border: `2px solid ${color}`, boxShadow: shadow, marginBottom: 16 }}>
      {(icon || title) && <h3 style={{ color, fontSize: 14, letterSpacing: 2, marginBottom: 12, fontWeight: 700 }}>{icon} {title}</h3>}
      {children}
    </div>
  );
}

function AudioBtn({ label, icon = "🔊", onPlay, playing }) {
  return (
    <button onClick={onPlay}
      style={{ display: "flex", alignItems: "center", gap: 8, background: playing ? T.goldBg : T.bgAlt, border: `2px solid ${playing ? T.gold : T.border}`, borderRadius: 10, padding: "10px 18px", cursor: "pointer", fontFamily: "inherit", fontSize: 14, fontWeight: 700, color: playing ? T.goldText : T.text, transition: "all 0.2s" }}>
      <span style={{ fontSize: 20 }}>{playing ? "⏸" : icon}</span>{label}

        {[0, 4, 8, 12, 16, 20, 24, 28, 32].map((x, i) => (

        ))}
      </span>}
    </button>
  );
}

  );

function App() {
  const [mod, setMod] = useState(0);
  const [done, setDone] = useState(new Set());
  const ref = useRef(null);

  const mark = () => setDone(p => new Set([...p, MODULES[mod].id]));
  const next = () => { mark(); if (mod < MODULES.length - 1) { setMod(mod + 1); ref.current?.scrollTo(0, 0); } };
  const prev = () => { if (mod > 0) { setMod(mod - 1); ref.current?.scrollTo(0, 0); } };

  const render = () => {
    switch (MODULES[mod].id) {
      case "why": return <ModWhy />;
      case "anatomy": return <ModAnatomy />;
      case "pat": return <ModPAT />;
      case "vitals": return <ModVitals />;
      case "lungs": return <ModLungSounds />;
      case "heart": return <ModHeartSounds />;
      case "scope": return <ModScope />;
      case "communication": return <ModComm />;
      case "family": return <ModFamily />;
      case "sbar": return <ModSBAR />;
      case "scenario1": return <ScenarioModule scenario={SCENARIOS[0]} />;
      case "scenario2": return <ScenarioModule scenario={SCENARIOS[1]} />;
      case "scenario3": return <ScenarioModule scenario={SCENARIOS[2]} />;
      case "scenario4": return <ScenarioModule scenario={SCENARIOS[3]} />;
      case "maltreatment": return <ModMaltreatment />;
      case "special": return <ModSpecial />;
      case "protocols": return <ModProtocols />;
      case "qi": return <ModQI />;
      case "systems": return <ModSystems />;
      case "equipment": return <ModEquip />;
      case "checklist": return <ModChecklist />;
      case "resources": return <ModResources />;
      case "final": return <ModFinal />;
      default: return null;
    }
  };

  return (
    <div style={{ display: "flex", height: "100vh", fontFamily: "'Segoe UI', 'Helvetica Neue', sans-serif", background: T.bg, color: T.text }}>
      {/* Sidebar */}
      <div style={{ width: 260, background: T.sidebar, borderRight: `1px solid #222`, display: "flex", flexDirection: "column", overflowY: "auto", flexShrink: 0 }}>
        <div style={{ padding: "16px 14px", borderBottom: "1px solid #333" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <span style={{ fontSize: 26 }}>🚒</span>
            <div>
              <div style={{ fontSize: 14, fontWeight: 800, color: "#FFF" }}>{DEPT.short}</div>
              <div style={{ fontSize: 10, color: "#999" }}>Pediatric Readiness Training</div>
              <div style={{ fontSize: 10, color: "#666" }}>v2.0 — 23 Modules</div>
            </div>
          </div>
          <Bar current={done.size} total={MODULES.length} />
          <div style={{ fontSize: 11, color: "#999", marginTop: 6 }}>{done.size}/{MODULES.length} complete — {Math.round(done.size / MODULES.length * 100)}%</div>
        </div>
        <div style={{ flex: 1, padding: "6px 6px" }}>
          {MODULES.map((m, i) => (
            <button key={m.id} onClick={() => { setMod(i); ref.current?.scrollTo(0, 0); }}
              style={{ width: "100%", background: mod === i ? "#2A2A2A" : "transparent", border: mod === i ? `1px solid ${T.red}` : "1px solid transparent", borderRadius: 7, padding: "8px 10px", textAlign: "left", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, marginBottom: 1, fontFamily: "inherit" }}>
              <span style={{ fontSize: 15 }}>{done.has(m.id) ? "✅" : m.icon}</span>
              <span style={{ fontSize: 12, color: mod === i ? "#FFF" : "#999", fontWeight: mod === i ? 700 : 400, lineHeight: 1.3 }}>{m.title}</span>
            </button>
          ))}
        </div>
      </div>
      {/* Main Content */}
      <div ref={ref} style={{ flex: 1, overflowY: "auto", padding: "28px 36px", background: T.bgAlt }}>
        <div style={{ maxWidth: 820 }}>
          <div style={{ fontSize: 11, color: T.light, fontWeight: 700, letterSpacing: 1, marginBottom: 20 }}>
            MODULE {mod + 1} OF {MODULES.length} — {DEPT.name.toUpperCase()}
          </div>
          {render()}
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 36, paddingTop: 24, borderTop: `1px solid ${T.border}` }}>
            <button onClick={prev} disabled={mod === 0}
              style={{ background: T.bg, border: `2px solid ${T.border}`, borderRadius: 10, padding: "12px 28px", color: mod === 0 ? T.border : T.text, cursor: mod === 0 ? "default" : "pointer", fontWeight: 700, fontSize: 14, fontFamily: "inherit" }}>← Previous</button>
            {mod < MODULES.length - 1
              ? <button onClick={next} style={{ background: T.red, border: "none", borderRadius: 10, padding: "12px 28px", color: "#FFF", cursor: "pointer", fontWeight: 700, fontSize: 14, fontFamily: "inherit" }}>Mark Complete & Next →</button>
              : <button onClick={mark} style={{ background: T.ok, border: "none", borderRadius: 10, padding: "12px 28px", color: "#FFF", cursor: "pointer", fontWeight: 700, fontSize: 14, fontFamily: "inherit" }}>✅ Complete Training</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
